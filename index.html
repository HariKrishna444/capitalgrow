<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMEA — Faculty Marks Entry &amp; Approval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#1B2A4A;
  --ink-2:#233457;
  --parchment:#EFE8D9;
  --parchment-2:#E5DCC6;
  --card:#F7F2E7;
  --brass:#A8832F;
  --brass-light:#C9A24A;
  --seal-green:#2F5233;
  --seal-red:#8B2E2E;
  --text:#24211C;
  --text-soft:#5B5546;
  --rule:#C9BFA4;
  --rule-light:#E3DAC3;
  --radius:2px;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--parchment);
  color:var(--text);
  font-family:'Source Serif 4', Georgia, serif;
  line-height:1.55;
}
h1,h2,h3,h4{
  font-family:'Fraunces', Georgia, serif;
  color:var(--ink);
  margin:0;
  letter-spacing:-0.01em;
  font-weight:600;
}
.mono{font-family:'IBM Plex Mono', monospace;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---------------- LOGIN ---------------- */
.login-view{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  background:
    repeating-linear-gradient(to bottom, transparent 0 37px, rgba(233,225,201,0.05) 37px 38px),
    radial-gradient(circle at 82% 8%, rgba(200,162,74,0.14), transparent 42%),
    linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 55%, #16233F 100%);
}
.login-card{
  max-width:480px;
  width:100%;
  color:var(--parchment);
}
.eyebrow{
  display:inline-flex;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--brass-light);
  border:1px solid rgba(201,162,74,0.5);
  padding:5px 12px;
  border-radius:2px;
}
.login-card h1{
  color:#FBF7EC;
  font-size:clamp(28px,4.4vw,38px);
  margin-top:18px;
  line-height:1.1;
}
.login-sub{
  margin-top:14px;
  color:#D8D0BC;
  font-size:15px;
  max-width:46ch;
}
.persona-list{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.persona-group-label{
  margin-top:14px;
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--brass-light);
  opacity:0.85;
}
.persona-group-label:first-child{margin-top:0;}
.persona-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  background:rgba(247,242,231,0.05);
  border:1px solid rgba(201,162,74,0.28);
  color:#EFE8D9;
  padding:14px 16px;
  text-align:left;
  border-radius:2px;
  transition:background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
}
.persona-btn:hover{
  background:rgba(201,162,74,0.12);
  border-color:var(--brass-light);
  transform:translateX(2px);
}
.persona-btn .p-name{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:16px;
  display:block;
}
.persona-btn .p-desc{
  font-size:12.5px;
  color:#B9AF93;
  margin-top:3px;
  display:block;
}
.persona-btn .p-code{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.08em;
  color:var(--brass-light);
  border:1px solid var(--brass-light);
  padding:3px 9px;
  border-radius:2px;
  flex-shrink:0;
}

/* ---------------- SHELL ---------------- */
.shell{min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 22px;
  height:60px;
  background:var(--ink);
  color:var(--parchment);
  border-bottom:2px solid var(--brass);
  position:relative;
  z-index:20;
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand-mark{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:19px;
  letter-spacing:0.03em;
  color:#FBF7EC;
}
.brand-sub{font-size:11px;color:#B9AF93;letter-spacing:0.05em;}
.topbar-right{display:flex;align-items:center;gap:14px;position:relative;}
.bell-btn{
  background:none;border:none;color:#D8D0BC;
  position:relative;padding:6px;display:flex;
}
.bell-btn:hover{color:var(--brass-light);}
.bell-count{
  position:absolute;top:0;right:0;
  background:var(--seal-red);color:#fff;
  font-family:'IBM Plex Mono', monospace;
  font-size:9px;line-height:1;
  padding:2px 4px;border-radius:8px;
}
.notif-panel{
  position:absolute;top:46px;right:60px;
  width:320px;max-height:380px;overflow-y:auto;
  background:var(--card);color:var(--text);
  border:1px solid var(--rule);
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  z-index:30;
}
.notif-item{
  padding:12px 14px;border-bottom:1px solid var(--rule-light);
  font-size:13px;
}
.notif-item:last-child{border-bottom:none;}
.notif-item .n-title{font-weight:600;color:var(--seal-red);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;}
.notif-item .n-body{margin-top:4px;color:var(--text-soft);}
.notif-item .n-time{margin-top:6px;font-size:10.5px;color:#8a8267;font-family:'IBM Plex Mono',monospace;}
.notif-empty{padding:20px;text-align:center;color:var(--text-soft);font-size:13px;}
.user-chip{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;}
.user-name{font-size:13px;color:#FBF7EC;}
.role-tag{font-size:10px;color:var(--brass-light);letter-spacing:0.06em;}
.ghost-btn{
  background:transparent;border:1px solid rgba(201,162,74,0.4);
  color:#D8D0BC;padding:7px 13px;font-size:12px;border-radius:2px;
  transition:all 0.15s ease;
}
.ghost-btn:hover{border-color:var(--brass-light);color:var(--brass-light);}

.body-shell{flex:1;display:flex;}
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--parchment-2);
  border-right:1px solid var(--rule);
  padding:22px 0;
}
.nav-item{
  display:block;width:100%;text-align:left;
  background:none;border:none;
  padding:11px 22px;
  font-family:'IBM Plex Mono', monospace;
  font-size:12.5px;letter-spacing:0.03em;
  color:var(--text-soft);
  border-left:3px solid transparent;
}
.nav-item:hover{color:var(--ink);background:rgba(168,131,47,0.08);}
.nav-item.active{
  color:var(--ink);font-weight:600;
  border-left-color:var(--brass);
  background:rgba(168,131,47,0.1);
}
.content{flex:1;padding:32px 36px 60px;max-width:1080px;}

/* ---------------- SHARED COMPONENTS ---------------- */
.page-head{margin-bottom:24px;}
.page-eyebrow{
  font-family:'IBM Plex Mono', monospace;font-size:11px;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--brass);
}
.page-head h2{font-size:26px;margin-top:6px;}
.page-head p{color:var(--text-soft);margin-top:8px;max-width:60ch;font-size:15px;}

.card{
  background:var(--card);border:1px solid var(--rule);
  padding:20px 22px;margin-bottom:16px;
}
.card-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;
}
.section-title{font-size:17px;font-family:'Fraunces',serif;font-weight:600;color:var(--ink);}
.section-meta{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-soft);margin-top:4px;}

.status-pill{
  font-family:'IBM Plex Mono', monospace;font-size:10.5px;
  letter-spacing:0.05em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;display:inline-block;border:1px solid transparent;
}
.status-draft{background:#E3DAC3;color:var(--text-soft);border-color:var(--rule);}
.status-submitted{background:#DDE6F0;color:#2E5C8A;border-color:#B7CBE0;}
.status-coordinated{background:#E1EEE2;color:#3E6E5B;border-color:#BFDCC2;}
.status-verified{background:#F1E6C9;color:var(--brass);border-color:#E1CE93;}
.status-approved{background:#DCEADD;color:var(--seal-green);border-color:#B9D3BA;}
.status-sentback{background:#F3DEDE;color:var(--seal-red);border-color:#E4B9B9;}

.btn{
  border:1px solid var(--ink);background:var(--ink);color:#FBF7EC;
  padding:9px 16px;font-size:13px;border-radius:2px;
  font-family:'Source Serif 4', serif; font-weight:600;
  transition:opacity 0.15s ease;
}
.btn:hover{opacity:0.85;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-outline{
  background:transparent;color:var(--ink);border:1px solid var(--ink);
}
.btn-brass{background:var(--brass);border-color:var(--brass);color:#FBF7EC;}
.btn-green{background:var(--seal-green);border-color:var(--seal-green);color:#fff;}
.btn-red{background:transparent;border-color:var(--seal-red);color:var(--seal-red);}
.btn-red:hover{background:var(--seal-red);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;}

table.data-table{
  width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px;
}
.data-table thead th{
  font-family:'IBM Plex Mono', monospace;font-size:10.5px;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--text-soft);
  text-align:left;padding:9px 10px;border-bottom:1px solid var(--rule);
}
.data-table tbody td{padding:9px 10px;border-bottom:1px solid var(--rule-light);vertical-align:middle;}
.data-table tbody tr:last-child td{border-bottom:none;}
.data-table input[type=number]{
  width:64px;padding:5px 7px;border:1px solid var(--rule);
  background:#fff;font-size:13px;border-radius:2px;
}
.data-table input[type=number]:focus{outline:2px solid var(--brass-light);outline-offset:1px;}
.data-table input.invalid{border-color:var(--seal-red);background:#FBEFEF;}
.total-cell{font-family:'IBM Plex Mono', monospace;font-weight:600;color:var(--ink);}

.empty-state{
  padding:40px 20px;text-align:center;color:var(--text-soft);
  border:1px dashed var(--rule);background:var(--card);
}
.empty-state .em-title{font-family:'Fraunces',serif;color:var(--ink);font-size:17px;margin-bottom:6px;}

/* modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(20,26,40,0.55);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-box{
  background:var(--parchment);border:1px solid var(--rule);
  max-width:760px;width:100%;max-height:86vh;overflow-y:auto;
  padding:26px 28px 26px;box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.modal-box h3{font-size:20px;}
.modal-close{
  float:right;background:none;border:none;font-size:20px;color:var(--text-soft);line-height:1;
}
.remark-box{
  width:100%;min-height:80px;border:1px solid var(--rule);padding:10px;
  font-family:'Source Serif 4',serif;font-size:14px;margin-top:10px;background:#fff;
}
.audit-item{
  border-left:2px solid var(--rule);padding:8px 0 8px 14px;margin-bottom:4px;font-size:13px;
}
.audit-item .a-head{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass);letter-spacing:0.04em;text-transform:uppercase;}
.audit-item .a-body{margin-top:3px;color:var(--text);}
.audit-item .a-time{font-size:10.5px;color:var(--text-soft);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

/* toast */
.toast-container{
  position:fixed;bottom:20px;right:20px;z-index:200;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  background:var(--ink);color:#FBF7EC;padding:12px 18px;
  border-left:3px solid var(--brass);font-size:13.5px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);min-width:240px;
  animation:toast-in 0.25s ease;
}
.toast.err{border-left-color:var(--seal-red);}
.toast.ok{border-left-color:var(--seal-green);}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* weight bar reuse */
.weight-inline{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-soft);margin-top:4px;}
.weight-track{width:120px;height:7px;background:#DCD3B9;display:flex;overflow:hidden;}
.weight-cie{background:var(--ink);width:50%;}
.weight-see{background:var(--brass);width:50%;}

.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:18px;}
.config-field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-soft);margin-bottom:5px;}
.config-field input,.config-field select{
  width:100%;padding:8px 10px;border:1px solid var(--rule);background:#fff;font-size:13.5px;
}

.branch-heading{
  margin-top:22px;margin-bottom:8px;
  font-family:'IBM Plex Mono', monospace;font-size:11px;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--brass);
  border-bottom:1px solid var(--rule-light);padding-bottom:6px;
}
.branch-heading:first-child{margin-top:0;}
.search-input{
  width:100%;padding:10px 12px;border:1px solid var(--rule);
  background:#fff;font-size:13.5px;border-radius:2px;
}
.search-input:focus{outline:2px solid var(--brass-light);outline-offset:1px;}

.table-scroll{overflow-x:auto;}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--rule);}
.tab-btn{
  background:none;border:none;padding:10px 16px;
  font-family:'IBM Plex Mono', monospace;font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--text-soft);border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--ink);font-weight:600;border-bottom-color:var(--brass);}
.tab-btn.locked{color:#a89f86;}
.tab-panel.hidden{display:none;}
.import-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px;}
.file-input-label{
  display:inline-flex;align-items:center;gap:8px;
  border:1px dashed var(--rule);padding:9px 14px;font-size:13px;color:var(--text-soft);
  border-radius:2px;cursor:pointer;background:#fff;
}
.file-input-label:hover{border-color:var(--brass);color:var(--ink);}

@media (max-width:820px){
  .body-shell{flex-direction:column;}
  .sidebar{width:100%;display:flex;overflow-x:auto;padding:10px 0;border-right:none;border-bottom:1px solid var(--rule);}
  .nav-item{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;}
  .nav-item.active{border-left-color:transparent;border-bottom-color:var(--brass);}
  .content{padding:22px 16px 50px;}
  .notif-panel{right:16px;width:280px;}
}
@media print{
  .topbar,.sidebar,.toast-container,#modal-root .modal-close, .no-print{display:none !important;}
  body{background:#fff;}
  .content{padding:0;max-width:none;}
}
</style>
</head>
<body>

  <div id="app">

    <!-- LOGIN VIEW -->
    <section id="login-view" class="login-view">
      <div class="login-card">
        <span class="eyebrow">Record No. FMEA‑07</span>
        <h1>Faculty Marks Entry &amp; Approval</h1>
        <p class="login-sub">Sign in with the email and password issued to you by the System Administrator.</p>
        <form id="login-form" class="login-form" style="margin-top:30px;display:flex;flex-direction:column;gap:14px;" onsubmit="return false;">
          <div class="config-field">
            <label style="color:var(--brass-light);">Email</label>
            <input id="login-email" type="email" autocomplete="username" placeholder="you@suh.in" style="width:100%;">
          </div>
          <div class="config-field">
            <label style="color:var(--brass-light);">Password</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;">
          </div>
          <div id="login-error" class="section-meta hidden" style="color:#E38C8C;"></div>
          <button id="login-submit-btn" type="submit" class="btn" style="margin-top:4px;">Sign In</button>
          <p class="section-meta" style="color:#B9AF93;">No account or forgotten password? Contact your System Administrator — accounts and passwords are issued by them, not self-registered.</p>
        </form>
      </div>
    </section>

    <!-- APP SHELL -->
    <div id="shell" class="shell hidden">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">FMEA</span>
          <span class="brand-sub mono">Marks Entry &amp; Approval</span>
        </div>
        <div class="topbar-right">
          <button id="bell-btn" class="bell-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span id="bell-count" class="bell-count hidden">0</span>
          </button>
          <div id="notif-panel" class="notif-panel hidden"></div>
          <div class="user-chip">
            <span id="user-name" class="user-name"></span>
            <span id="user-role" class="role-tag mono"></span>
          </div>
          <button id="logout-btn" class="ghost-btn">Sign out</button>
        </div>
      </header>

      <div class="body-shell">
        <nav id="sidebar" class="sidebar"></nav>
        <main id="content" class="content"></main>
      </div>
    </div>

  </div>

  <div id="toast-container" class="toast-container"></div>
  <div id="modal-root"></div>
  <div id="print-area"></div>

<script>
/* =========================================================
   Faculty Marks Entry & Approval — client-side demo engine
   Vanilla JS, backed by a live Supabase Postgres database
   (see the schema/seed SQL — profiles, courses, students,
   assignments, notifications, course_history, app_settings,
   term_test_history).

   Role model:
   - Fixed system roles: ADMIN, HOD, EA, EXAM
   - FACULTY is the only "person" role — whether a faculty
     member currently behaves as a Course Coordinator (CC) or
     Course Instructor (CI) is derived at runtime from the
     `assignments` table, never stored on the user record.
   ========================================================= */

/* ---------------- Supabase connection ---------------- */
const SUPABASE_URL = 'https://dhmidutrazdhhiqsstxv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRobWlkdXRyYXpkaGhpcXNzdHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzOTMwOTIsImV4cCI6MjA5OTk2OTA5Mn0.jXlLh7b737FzsKpavzr5lHzSn04mjcb1XhWZaPFn9ko';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ROLE_LABELS = { ADMIN:'Administrator', HOD:'Head of Department', EA:'Executive Assistant', EXAM:'Examination Branch', FACULTY:'Faculty' };

const BRANCH_LABELS = { CSE:'CSE — Computer Science', AIML:'AIML — AI & Machine Learning', SAP:'SAP — Systems & Applications', ECE:'ECE — Electronics & Comm.' };
function branchLabel(b){ return BRANCH_LABELS[b] || b || '—'; }

// ============================================================================
// EVALUATION TYPE (ET) TEMPLATES — sourced directly from the institution's
// official Evaluation Scheme sheet. Each template is identified by its
// Abbreviation (ET1, ET2, ET3, ETP1, ETP2, ETS, EPP, EP, EPS, ES, ESS1, ESS2,
// EAC) and defines the exact CIE + SEE components, their raw exam marks, and
// their scaled weight. The Course Coordinator fixes one template per course
// section (the app auto-detects it from the Subject Lookup Table by course
// code where possible, with manual override always available). Whichever
// template is fixed determines exactly which components the Course
// Instructor's marks-entry form renders — the form is generated automatically:
//   Select Subject → Lookup Subject Table → Get Abbreviation → Fetch
//   Evaluation Template → Generate Form Automatically
//
// Component shape: { key, label, rawMax, scaledMax }
//   rawMax    = the raw marks the component is scored out of (what the CI enters)
//   scaledMax = the weighted marks it contributes to CIE/SEE total
// Where the sheet lists exam marks as "-" (no separate raw scale), rawMax is
// set equal to scaledMax, i.e. the CI enters the achieved score directly.
// ============================================================================
const EVAL_TEMPLATES = [
  { abbr:'ET1', courseType:'Theory', label:'ET1 — Theory',
    cie:[
      { key:'tt1',              label:'Term Test - 1',                          rawMax:50, scaledMax:15 },
      { key:'tt2',              label:'Term Test - 2',                          rawMax:50, scaledMax:15 },
      { key:'moocsAssignments', label:'MOOCS (Self Learning Module)/Assignments', rawMax:10, scaledMax:10 },
      { key:'sia',              label:'SIA Tests - 5 Objective',                rawMax:10, scaledMax:10 },

// making CIE(50)+SEE(100)=150 even though the sheet's own "Total Marks" footer

// Subject Lookup Table: course code -> ET abbreviation, built from the
// "Courses Applicable" column of the sheet. Powers the auto-detect flow:
// Select Subject -> Lookup Subject Table -> Get Abbreviation -> Fetch Template.
const SUBJECT_LOOKUP = {};
EVAL_TEMPLATES.forEach(t=>{
  (t.courses||[]).forEach(c=>{ SUBJECT_LOOKUP[normalizeCode(c.code)] = t.abbr; });
});
function normalizeCode(code){ return (code||'').toString().trim().toUpperCase().replace(/\s+/g,''); }
function lookupAbbrForCode(code){ return SUBJECT_LOOKUP[normalizeCode(code)] || null; }
function subjectNameForCode(code){
  const norm = normalizeCode(code);
  for(const t of EVAL_TEMPLATES){ const hit = (t.courses||[]).find(c=>normalizeCode(c.code)===norm); if(hit) return hit.name; }
  return null;
}
const DEFAULT_EVAL_TYPE = 'ET1'; // legacy fallback for records created before ET existed
function getTemplate(abbr){ return EVAL_TEMPLATES.find(e=>e.abbr===abbr) || null; }
function evalTypeLabel(abbr){ const t = getTemplate(abbr); return t ? t.label : '— Not yet fixed by Coordinator —'; }
function getCourseTemplate(course){ return getTemplate(course && course.evalType) || getTemplate(DEFAULT_EVAL_TYPE); }
function getCourseComponents(course){ return getCourseTemplate(course).cie; }
function getCourseSeeComponents(course){ return getCourseTemplate(course).see; }
function evalTypeOptionsHtml(selected){
  return `<option value="">— Select Evaluation Type —</option>` +

}

/* ---------------- Supabase-backed persistence ----------------
   The app still works against one in-memory `state` object (same
   shape as before) so every render function is unchanged. On boot —
   and again right after sign-in — we fetch every table and assemble
   it into that shape. Every mutation happens in memory first (so the
   UI stays instant), then a *targeted* sync function pushes only the
   row(s) that actually changed, instead of re-writing everything. */

async function fetchStateFromSupabase(){
  const [profilesR, coursesR, studentsR, assignmentsR, notificationsR, historyR, ttHistoryR, settingsR] = await Promise.all([
    sb.from('profiles').select('*').order('created_at', { ascending:true }),
    sb.from('courses').select('*').order('created_at', { ascending:true }),
    sb.from('students').select('*'),
    sb.from('assignments').select('*').order('assigned_at', { ascending:true }),
    sb.from('notifications').select('*').order('ts', { ascending:false }),
    sb.from('course_history').select('*').order('ts', { ascending:false }),
    sb.from('term_test_history').select('*').order('ts', { ascending:false }),
    sb.from('app_settings').select('*'),
  ]);

  const named = [
    ['profiles',profilesR],['courses',coursesR],['students',studentsR],['assignments',assignmentsR],
    ['notifications',notificationsR],['course_history',historyR],['term_test_history',ttHistoryR],['app_settings',settingsR],
  ];
  const firstErr = named.find(([,r])=>r.error);
  if(firstErr){
    const [table, r] = firstErr;
    const e = r.error;
    throw new Error(`Supabase query on "${table}" failed: ${e.message || JSON.stringify(e)}${e.hint ? ' — hint: '+e.hint : ''}${e.code ? ' (code '+e.code+')' : ''}`);
  }
  if(!profilesR.data || profilesR.data.length===0) throw new Error('The "profiles" table came back empty for this session.');

  const users = profilesR.data.map(p=>({ id:p.id, name:p.name, email:p.email, systemRole:p.system_role, homeBranch:p.home_branch||undefined, authId:p.auth_id||null }));

  const courses = coursesR.data.map(c=>({
    id:c.id, code:c.code, name:c.name, section:c.section, branch:c.branch,
    status:c.status, sentBack:!!c.sent_back, lastRemark:c.last_remark||'', eaRemark:c.ea_remark||'',
    evalType:c.eval_type || null,
    students:[], history:[]
  }));
  const courseById = id => courses.find(c=>c.id===id);

  (studentsR.data||[]).forEach(s=>{
    const course = courseById(s.course_id);
    if(course) course.students.push({ id:s.id, name:s.name, marks: s.marks || {} });
  });
  (historyR.data||[]).forEach(h=>{
    const course = courseById(h.course_id);
    if(course) course.history.push({ id:h.id, ts:new Date(h.ts).getTime(), user:h.user_name, role:h.role, action:h.action, remark:h.remark||'' });
  });

  const assignments = (assignmentsR.data||[]).map(a=>({
    id:a.id, type:a.type, courseId:a.course_id, userId:a.user_id, assignedBy:a.assigned_by,
    assignedAt:new Date(a.assigned_at).getTime(), status:a.status,
    revokedAt:a.revoked_at ? new Date(a.revoked_at).getTime() : undefined,
    revokedBy:a.revoked_by || undefined,
  }));

  const notifications = (notificationsR.data||[]).map(n=>({
    id:n.id, forUserId:n.for_user_id, courseId:n.course_id, title:n.title, body:n.body,
    ts:new Date(n.ts).getTime(), read:!!n.read
  }));

  const termTestHistory = (ttHistoryR.data||[]).map(t=>({ id:t.id, ts:new Date(t.ts).getTime(), by:t.by_name, value:t.value }));

  let currentTermTest = null;
  const ctRow = (settingsR.data||[]).find(r=>r.key==='current_term_test');
  if(ctRow && ctRow.value!==null && ctRow.value!==undefined) currentTermTest = ctRow.value;

  return { currentUserId:null, users, courses, assignments, notifications, currentTermTest, termTestHistory };
}

const rowOf = {
  profile:(u)=>({ id:u.id, name:u.name, email:u.email, system_role:u.systemRole, home_branch:u.homeBranch||null }),
  course:(c)=>({ id:c.id, code:c.code, name:c.name, section:c.section, branch:c.branch, status:c.status, sent_back:!!c.sentBack, last_remark:c.lastRemark||'', ea_remark:c.eaRemark||'', eval_type:c.evalType||null }),
  student:(courseId,s)=>({ id:s.id, course_id:courseId, name:s.name, marks:s.marks||{} }),
  assignment:(a)=>({
    id:a.id, type:a.type, course_id:a.courseId, user_id:a.userId, assigned_by:a.assignedBy||null,
    assigned_at:new Date(a.assignedAt).toISOString(), status:a.status,
    revoked_at:a.revokedAt ? new Date(a.revokedAt).toISOString() : null,
    revoked_by:a.revokedBy || null,
  }),
  notification:(n)=>({ id:n.id, for_user_id:n.forUserId, course_id:n.courseId||null, title:n.title, body:n.body, ts:new Date(n.ts).toISOString(), read:!!n.read }),
  history:(courseId,h)=>({ id:h.id, course_id:courseId, ts:new Date(h.ts).toISOString(), user_name:h.user, role:h.role, action:h.action, remark:h.remark||'' }),
  termTest:(t)=>({ id:t.id, ts:new Date(t.ts).toISOString(), by_name:t.by, value:t.value }),
};

async function warnOnError(promise, label, opts={}){
  const { error } = await promise;
  if(error){
    console.warn(`Supabase sync failed (${label}):`, error.message || error);
    if(opts.toastOnFail){
      toast(`Save failed (${label}): ${error.message || error}. Other users won't see this change until it's fixed — check your Supabase RLS policies / grants.`, 'err');
    }
  }
  return { error };
}

function syncProfile(u){ return warnOnError(sb.from('profiles').upsert(rowOf.profile(u)), 'profile:'+u.id, {toastOnFail:true}); }
function syncProfiles(users){ return users.length ? warnOnError(sb.from('profiles').upsert(users.map(rowOf.profile)), 'profiles:bulk', {toastOnFail:true}) : Promise.resolve(); }
function syncCourse(c){ return warnOnError(sb.from('courses').upsert(rowOf.course(c)), 'course:'+c.id, {toastOnFail:true}); }
function syncStudent(courseId, s){ return warnOnError(sb.from('students').update({ marks:s.marks||{} }).eq('id', s.id), 'student:'+s.id, {toastOnFail:true}); }
function syncStudents(courseId, students){ return students.length ? warnOnError(Promise.all(students.map(s=>sb.from('students').update({ marks:s.marks||{} }).eq('id', s.id))).then(results=>({ error: results.find(r=>r.error)?.error })), 'students:'+courseId, {toastOnFail:true}) : Promise.resolve(); }
function syncAssignment(a){ return warnOnError(sb.from('assignments').upsert(rowOf.assignment(a)), 'assignment:'+a.id, {toastOnFail:true}); }
function syncNotification(n){ return warnOnError(sb.from('notifications').insert(rowOf.notification(n)), 'notification:'+n.id); }
function syncNotificationRead(n){ return warnOnError(sb.from('notifications').update({ read:true }).eq('id', n.id), 'notification-read:'+n.id); }
function syncHistory(courseId, h){ return warnOnError(sb.from('course_history').insert(rowOf.history(courseId,h)), 'history:'+h.id); }
function syncAppSetting(key, value){ return warnOnError(sb.from('app_settings').upsert({ key, value: JSON.stringify(value ?? null) }), 'app_settings:'+key); }
function syncTermTest(t){ return warnOnError(sb.from('term_test_history').insert(rowOf.termTest(t)), 'term_test:'+t.id); }

/* ---------------- real auth: email + password sign-in ----------------
   Accounts and passwords are provisioned entirely by the System Admin
   (see the "Manage System Accounts" screen + the admin-manage-user
   Edge Function). This page only ever calls signInWithPassword — it
   never creates accounts or sets passwords itself. On first sign-in
   for an address we silently link the Supabase Auth user to its
   matching `profiles` row (auth_id), which is what RLS policies key
   off from then on. */

let authBusy = false;

async function attemptPasswordLogin(email, password){
  const errBox = document.getElementById('login-error');
  const btn = document.getElementById('login-submit-btn');
  if(errBox){ errBox.classList.add('hidden'); errBox.textContent = ''; }
  if(!email || !password){
    if(errBox){ errBox.textContent = 'Enter both email and password.'; errBox.classList.remove('hidden'); }
    return;
  }
  if(authBusy) return;
  authBusy = true;
  if(btn){ btn.disabled = true; btn.textContent = 'Signing in…'; }
  try{
    const { error } = await sb.auth.signInWithPassword({ email: email.trim().toLowerCase(), password });
    if(error) throw error;
    // handleSignedIn() runs via onAuthStateChange once the session lands
  }catch(e){
    const msg = (e && e.message) ? e.message : String(e);
    if(errBox){ errBox.textContent = 'Sign-in failed: ' + msg; errBox.classList.remove('hidden'); }
  }finally{
    authBusy = false;
    if(btn){ btn.disabled = false; btn.textContent = 'Sign In'; }
  }
}

async function handleSignedIn(session){
  const email = (session.user.email || '').toLowerCase();
  if(!email) return;
  // first login for this address: claim the matching profiles row
  await warnOnError(
    sb.from('profiles').update({ auth_id: session.user.id }).is('auth_id', null).eq('email', email),
    'self-link:'+email
  );
  try{
    const state = await fetchStateFromSupabase();
    const me = state.users.find(u => u.email.toLowerCase() === email);
    if(!me){
      const errBox = document.getElementById('login-error');
      if(errBox){ errBox.textContent = `Signed in as ${email}, but no matching profile exists in the directory. Ask your Admin to add you.`; errBox.classList.remove('hidden'); }
      await sb.auth.signOut();
      return;
    }
    state.currentUserId = me.id;
    App.state = state;
    App.completeLogin(me.id);
  }catch(e){
    const errBox = document.getElementById('login-error');
    if(errBox){ errBox.textContent = 'Signed in, but could not load your data: ' + (e.message || e); errBox.classList.remove('hidden'); }
  }
}

sb.auth.onAuthStateChange((event, session) => {
  if(session && !App.state.currentUserId && ['SIGNED_IN','INITIAL_SESSION','TOKEN_REFRESHED'].includes(event)){
    handleSignedIn(session);
  }
});

/* ---------------- Admin-only: account & password provisioning ----------------
   These call a Supabase Edge Function (admin-manage-user) using the
   currently signed-in Admin's own access token. The function itself
   re-checks server-side that the caller is really an ADMIN before it
   touches anything — the service-role key never appears in this file. */
async function callAdminManageUser(action, payload){
  const { data: sessionData } = await sb.auth.getSession();
  const token = sessionData && sessionData.session ? sessionData.session.access_token : null;
  if(!token) throw new Error('Not signed in.');
  const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-manage-user`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      'apikey': SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ action, ...payload })
  });
  const body = await res.json().catch(()=>({}));
  if(!res.ok || body.error) throw new Error(body.error || `Request failed (${res.status})`);
  return body;
}

/* ---------------- assignment helpers (the "assignment tables") ---------------- */
function getActiveAssignment(courseId, type){
  return App.state.assignments.find(a=>a.courseId===courseId && a.type===type && a.status==='active');
}
function getCourseCCUser(courseId){ const a=getActiveAssignment(courseId,'CC'); return a ? App.getUserById(a.userId) : null; }
function getCourseCIUser(courseId){ const a=getActiveAssignment(courseId,'CI'); return a ? App.getUserById(a.userId) : null; }
function getFacultyCourses(userId){
  const ccCourses = App.state.courses.filter(c => getActiveAssignment(c.id,'CC')?.userId===userId);
  const ciCourses = App.state.courses.filter(c => getActiveAssignment(c.id,'CI')?.userId===userId);
  return { ccCourses, ciCourses };
}
function createFacultyIfNeeded(email, name){
  const existing = App.state.users.find(u=>u.email.toLowerCase()===email.toLowerCase());
  if(existing) return { user:existing, isNew:false };
  const finalName = (name && name.trim()) ? name.trim() : email.split('@')[0].replace(/[._]+/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
  const user = { id:uid('fac'), name:finalName, email, systemRole:'FACULTY' };
  App.state.users.push(user);
  return { user, isNew:true };
}
function isValidEmail(email){ return /^\S+@\S+\.\S+$/.test(email); }

/* ---------------- app state ---------------- */
const App = {

  ready:false,

  currentUser(){ return this.state.users.find(u=>u.id===this.state.currentUserId) || null; },
  getUserById(id){ return this.state.users.find(u=>u.id===id) || null; },
  getCourse(id){ return this.state.courses.find(c=>c.id===id); },

  /* ---------- auth ---------- */

  notifyUser(userId, course, title, body){

  /* ---------- Admin: create account (with password) + set role + reset password ----------
     CC / CI are NOT handled here — those stay assigned inside the app by
     HOD (→ CC) and CC (→ CI) exactly as before. This panel only covers
     the fixed system roles: ADMIN, HOD, EA, EXAM, and plain FACULTY. */
  async createSystemAccount(rawName, rawEmail, role, rawPassword){
    const name = (rawName||'').trim();
    const email = (rawEmail||'').trim().toLowerCase();
    const password = (rawPassword||'').trim();
    if(!name || !email){ toast('Name and email are required.', 'err'); return; }
    if(!isValidEmail(email)){ toast('Enter a valid email address.', 'err'); return; }
    if(!password || password.length < 8){ toast('Set a password of at least 8 characters.', 'err'); return; }
    if(this.state.users.find(u=>u.email.toLowerCase()===email)){ toast('A user with this email already exists.', 'err'); return; }
    const id = uid('u'); // generated up front so the Edge Function's profiles insert has an id to use
    try{
      await callAdminManageUser('create_user', { id, name, email, role, password });
      const user = { id, name, email, systemRole:role };
      this.state.users.push(user);
      toast(`${name} added as ${ROLE_LABELS[role]}, with sign-in credentials issued.`, 'ok');
      this.navigate('admin-users');
    }catch(e){
      toast('Could not create account: ' + (e.message || e), 'err');
    }
  },
  async setSystemRole(userId, role){
    const u = this.getUserById(userId);
    if(!u) return;
    const prevRole = u.systemRole;
    u.systemRole = role;
    try{
      await syncProfile(u);
      toast(`${u.name} is now ${ROLE_LABELS[role]}.`, role==='FACULTY' ? 'err' : 'ok');
    }catch(e){
      u.systemRole = prevRole;
      toast('Could not update role: ' + (e.message || e), 'err');
    }
    this.navigate('admin-users');
  },
  async setUserPassword(userId, rawPassword){
    const u = this.getUserById(userId);
    const password = (rawPassword||'').trim();
    if(!u) return;
    if(!password || password.length < 8){ toast('Set a password of at least 8 characters.', 'err'); return; }
    try{
      await callAdminManageUser('set_password', { email: u.email, password });
      toast(`Password updated for ${u.name}.`, 'ok');
      this.navigate('admin-users');
    }catch(e){
      toast('Could not set password: ' + (e.message || e), 'err');
    }
  },

  /* ---------- HOD → CC, CC → CI: assign / revoke ---------- */
  assignRole(type, courseId, rawEmail, rawName, evalType){
    const course = this.getCourse(courseId);
    if(!course){ toast('Choose a course first.', 'err'); return; }
    const actor = this.currentUser();
    const email = (rawEmail||'').trim().toLowerCase();
    if(!email){ toast('A faculty email is required.', 'err'); return; }
    if(!isValidEmail(email)){ toast('Enter a valid email address.', 'err'); return; }
    if(type==='CC' && !['HOD','ADMIN'].includes(actor.systemRole)){ toast('Only the HOD can assign a Course Coordinator.', 'err'); return; }
    if(type==='CI'){
      const ccA = getActiveAssignment(courseId,'CC');
      const isCoordinator = ccA && ccA.userId===actor.id;
      if(!isCoordinator && !['HOD','ADMIN'].includes(actor.systemRole)){ toast('Only the assigned Course Coordinator can assign a Course Instructor.', 'err'); return; }
      if(!getTemplate(evalType)){ toast('Choose an Evaluation Type for this course before assigning the Course Instructor.', 'err'); return; }
    }
    const existing = getActiveAssignment(courseId, type);
    if(existing){ existing.status='revoked'; existing.revokedAt=Date.now(); existing.revokedBy=actor.id; syncAssignment(existing); }
    const { user, isNew } = createFacultyIfNeeded(email, rawName);
    if(isNew) syncProfile(user);
    const rec = { id:uid('asg'), type, courseId, userId:user.id, email:user.email, assignedBy:actor.id, assignedAt:Date.now(), status:'active' };
    this.state.assignments.push(rec);
    syncAssignment(rec);
    const roleLabel = type==='CC' ? 'Course Coordinator' : 'Course Instructor';
    let etNote = '';
    if(type==='CI'){
      course.evalType = evalType;
      syncCourse(course);
      etNote = ` · Evaluation Type fixed as: ${evalTypeLabel(evalType)}`;
    }
    this.logHistory(course, `${roleLabel} assigned: ${user.name} (${user.email})${etNote}`);
    this.notifyUser(user.id, course, `You're now ${roleLabel}`, `${actor.name} assigned you as ${roleLabel} for ${course.code} — ${course.name}.${type==='CI' ? ` The Evaluation Type for this section is fixed as "${evalTypeLabel(evalType)}" — enter marks only for the components shown.` : ''} This role is active immediately — no separate approval step is needed.`);
    toast(`${user.name} is now ${roleLabel} for ${course.code}.${etNote}`, 'ok');
    closeModal();
    renderSidebar();
    renderContent();
  },
  revokeRole(type, courseId){
    const course = this.getCourse(courseId);
    const actor = this.currentUser();
    const existing = getActiveAssignment(courseId, type);
    if(!existing){ toast('No active assignment to revoke.', 'err'); return; }
    if(type==='CC' && !['HOD','ADMIN'].includes(actor.systemRole)){ toast('Only the HOD can revoke a Course Coordinator.', 'err'); return; }
    if(type==='CI'){
      const isCoordinator = getActiveAssignment(courseId,'CC')?.userId===actor.id;
      if(!isCoordinator && !['HOD','ADMIN'].includes(actor.systemRole)){ toast('Only the assigned Course Coordinator can revoke a Course Instructor.', 'err'); return; }
    }
    existing.status='revoked'; existing.revokedAt=Date.now(); existing.revokedBy=actor.id;
    syncAssignment(existing);
    if(type==='CI'){ course.evalType = null; syncCourse(course); }
    const user = this.getUserById(existing.userId);
    const roleLabel = type==='CC' ? 'Course Coordinator' : 'Course Instructor';
    this.logHistory(course, `${roleLabel} capability revoked: ${user ? user.name+' ('+user.email+')' : existing.email}`);
    if(user) this.notifyUser(user.id, course, `${roleLabel} access revoked`, `${actor.name} revoked your ${roleLabel} role for ${course.code} — ${course.name}.`);
    toast(`${roleLabel} capability revoked for ${course.code}.`, 'err');
    renderSidebar();
    renderContent();
  },

  /* ---------- marks workflow ---------- */
  saveMarks(courseId){
    const course = this.getCourse(courseId);
    if(!course) return;
    const touched = [];
    document.querySelectorAll(`[data-course="${courseId}"][data-field]`).forEach(input=>{
      const sid = input.dataset.student;
      const field = input.dataset.field;
      const student = course.students.find(s=>s.id===sid);
      if(!student) return;
      const val = input.value === '' ? null : parseFloat(input.value);
      student.marks[field] = (val===null || isNaN(val)) ? null : val;
      if(!touched.includes(student)) touched.push(student);
    });
    // targeted write: only the students whose marks actually changed on screen
    syncStudents(courseId, touched);
    return course;
  },
  validateCIEComplete(course){
    const components = getCourseComponents(course);
    for(const s of course.students){
      for(const comp of components){
        const v = s.marks[comp.key];
        if(v===undefined || v===null || v==='' || isNaN(v)) return { ok:false, msg:`Missing ${comp.label} score for ${s.name}.` };
        if(v < 0 || v > comp.rawMax) return { ok:false, msg:`${comp.label} score for ${s.name} exceeds the maximum of ${comp.rawMax}.` };
      }
    }
    return { ok:true };
  },
  validateSEEComplete(course){
    const components = getCourseSeeComponents(course);
    for(const s of course.students){
      for(const comp of components){
        const v = s.marks[comp.key];
        if(v===undefined || v===null || v==='' || isNaN(v)) return { ok:false, msg:`Missing ${comp.label} score for ${s.name}.` };
        if(v < 0 || v > comp.rawMax) return { ok:false, msg:`${comp.label} score for ${s.name} exceeds the maximum of ${comp.rawMax}.` };
      }
    }
    return { ok:true };
  },
  validateComplete(course){
    if(!course.evalType) return { ok:false, msg:'The Course Coordinator has not yet fixed an Evaluation Type for this section.' };
    const cieCheck = this.validateCIEComplete(course);
    if(!cieCheck.ok) return cieCheck;
    return this.validateSEEComplete(course);
  },
  ciSubmit(courseId){
    this.saveMarks(courseId);
    const course = this.getCourse(courseId);
    const check = this.validateComplete(course);
    if(!check.ok){ toast(check.msg, 'err'); return; }
    course.status = 'submitted';
    course.sentBack = false;
    syncCourse(course);
    this.logHistory(course, 'Submitted directly to the Executive Assistant for verification');
    this.state.users.filter(u => u.systemRole === 'EA').forEach(u =>
      this.notifyUser(u.id, course, `${course.code} ready for verification`, `${course.code} — ${course.name} has been submitted and is awaiting your verification.`)
    );
    toast(`${course.code} submitted to the Executive Assistant.`, 'ok');
    this.navigate('ci-sections');
  },
  ciSaveDraft(courseId){ this.saveMarks(courseId); toast('Draft saved.', 'ok'); },

  eaForward(courseId){
    const course = this.getCourse(courseId);
    const remarkEl = document.getElementById('ea-remark-input');
    course.eaRemark = remarkEl ? remarkEl.value.trim() : course.eaRemark;
    course.status = 'verified';
    syncCourse(course);
    this.logHistory(course, 'Verified for completeness and forwarded to HOD', course.eaRemark);
    this.state.users.filter(u => u.systemRole === 'HOD').forEach(u =>
      this.notifyUser(u.id, course, `${course.code} ready for approval`, `${course.code} — ${course.name} has been verified by the Executive Assistant and is awaiting your approval.`)
    );
    toast(`${course.code} forwarded to the HOD.`, 'ok');
    this.navigate('ea-list');
  },

  hodApprove(courseId){
    const course = this.getCourse(courseId);
    course.status = 'approved';
    syncCourse(course);
    this.logHistory(course, 'Approved — record locked for result processing');
    toast(`${course.code} approved and locked.`, 'ok');
    closeModal();
    this.navigate('hod-list');
  },
  hodSendBack(courseId){
    const course = this.getCourse(courseId);
    const remarkEl = document.getElementById('sendback-remark');
    const remark = remarkEl ? remarkEl.value.trim() : '';
    if(!remark){ toast('A correction remark is required to send a record back.', 'err'); return; }
    course.status = 'draft';
    course.sentBack = true;
    course.lastRemark = remark;
    course.eaRemark = '';
    syncCourse(course);
    this.logHistory(course, 'Sent back for correction', remark);
    const ciUser = getCourseCIUser(courseId);
    const ccUser = getCourseCCUser(courseId);
    [ciUser, ccUser].filter(Boolean).forEach(u => this.notifyUser(u.id, course, `${course.code} sent back for correction`, remark));
    toast(`${course.code} sent back to the instructor.`, 'err');
    closeModal();
    this.navigate('hod-list');
  },

  /* ---------- HOD: fix the active Term Test cycle, visible to every role ---------- */
  setTermTest(value){

  /* ---------- EA: faculty directory, uploaded branch-wise ---------- */
  addFacultyToDirectory(rawName, rawEmail, branch){
    const actor = this.currentUser();
    if(!['EA','ADMIN'].includes(actor.systemRole)){ toast('Only the Executive Assistant can upload the faculty directory.', 'err'); return; }
    const name = (rawName||'').trim();
    const email = (rawEmail||'').trim().toLowerCase();
    if(!name || !email){ toast('Name and email are required.', 'err'); return; }
    if(!isValidEmail(email)){ toast('Enter a valid email address.', 'err'); return; }
    if(!BRANCH_LABELS[branch]){ toast('Choose a branch.', 'err'); return; }
    const existing = this.state.users.find(u=>u.email.toLowerCase()===email);
    if(existing && existing.systemRole!=='FACULTY'){ toast('This email already belongs to a non-faculty account.', 'err'); return; }
    let row;
    if(existing){
      existing.name = name;
      existing.homeBranch = branch;
      row = existing;
    } else {
      row = { id:uid('fac'), name, email, systemRole:'FACULTY', homeBranch:branch };
      this.state.users.push(row);
    }
    syncProfile(row);
    toast(`${name} added to the ${branchLabel(branch)} faculty directory.`, 'ok');
    this.navigate('ea-faculty');
  },
  removeFacultyFromDirectory(userId){
    const actor = this.currentUser();
    if(!['EA','ADMIN'].includes(actor.systemRole)){ toast('Only the Executive Assistant can edit the faculty directory.', 'err'); return; }
    const u = this.getUserById(userId);
    if(!u) return;
    delete u.homeBranch;
    syncProfile(u);
    toast(`${u.name} removed from the faculty directory.`, 'err');
    this.navigate('ea-faculty');
  },
  bulkImportFaculty(rows){
    const actor = this.currentUser();
    if(!['EA','ADMIN'].includes(actor.systemRole)){ toast('Only the Executive Assistant can import the faculty directory.', 'err'); return; }
    if(!Array.isArray(rows) || rows.length===0){ toast('That file has no rows to import.', 'err'); return; }
    let added=0, updated=0, skipped=0;
    const touched = [];
    rows.forEach(row=>{
      const keys = Object.keys(row||{});
      const findKey = (re) => keys.find(k=>re.test(String(k).trim()));
      const nameKey = findKey(/^name$/i);
      const emailKey = findKey(/^e-?mail$/i);
      const branchKey = findKey(/^branch$/i);
      const name = nameKey ? String(row[nameKey]).trim() : '';
      const email = emailKey ? String(row[emailKey]).trim().toLowerCase() : '';
      const branch = branchKey ? String(row[branchKey]).trim().toUpperCase() : '';
      if(!name || !email || !isValidEmail(email) || !BRANCH_LABELS[branch]){ skipped++; return; }
      const existing = this.state.users.find(u=>u.email.toLowerCase()===email);
      if(existing && existing.systemRole!=='FACULTY'){ skipped++; return; }
      if(existing){ existing.name=name; existing.homeBranch=branch; updated++; touched.push(existing); }
      else { const u2={ id:uid('fac'), name, email, systemRole:'FACULTY', homeBranch:branch }; this.state.users.push(u2); added++; touched.push(u2); }
    });
    syncProfiles(touched);
    if(added+updated===0){
      toast(`Import found nothing usable. Check the file has Name, Email, and Branch columns (Branch must be ${Object.keys(BRANCH_LABELS).join('/')}).`, 'err');
    } else {
      toast(`Import complete — ${added} added, ${updated} updated${skipped?`, ${skipped} skipped`:''}.`, 'ok');
    }
    this.navigate('ea-faculty');
  },
};
window.App = App;

/* ---------------- small helpers ---------------- */
function computeCIE(student, components){
  components = components || [];
  let total = 0, complete = true;
  components.forEach(comp=>{
    const raw = student.marks[comp.key];
    if(typeof raw !== 'number'){ complete = false; return; }
    total += (Math.min(raw, comp.rawMax)/comp.rawMax) * comp.scaledMax;
  });
  return { total: round1(total), complete };
}
function computeSEE(student, components){
  return computeCIE(student, components || []);
}
function computeGrandTotal(student, course){
  const template = getCourseTemplate(course);
  const cie = computeCIE(student, template.cie);
  const see = computeSEE(student, template.see);
  return { cieTotal:cie.total, seeTotal:see.total, total: round1(cie.total + see.total), complete: cie.complete && see.complete };
}
function courseCIEComplete(course){
  const components = getCourseComponents(course);
  return course.students.every(s=>computeCIE(s, components).complete);
}
function courseSEEComplete(course){
  const components = getCourseSeeComponents(course);
  return course.students.every(s=>computeSEE(s, components).complete);
}
function round1(n){ return Math.round(n*10)/10; }
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function toast(msg, kind=''){
  const c = document.getElementById('toast-container');
  const t = el(`<div class="toast ${kind}">${escapeHtml(msg)}</div>`);
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3600);
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function emptyStateHtml(title, body){ return `<div class="empty-state"><div class="em-title">${escapeHtml(title)}</div>${escapeHtml(body)}</div>`; }
function openModal(html){
  const root = document.getElementById('modal-root');

function exportCSV(courseId){
  const course = App.getCourse(courseId);
  const template = getCourseTemplate(course);
  const cieComponents = template.cie, seeComponents = template.see;
  const header = ['Student', ...cieComponents.map(c=>c.label), 'CIE Total', ...seeComponents.map(c=>c.label), 'SEE Total', 'Grand Total'];
  const rows = course.students.map(s=>{
    const gt = computeGrandTotal(s, course);
    return [s.name, ...cieComponents.map(c=>s.marks[c.key] ?? ''), gt.cieTotal, ...seeComponents.map(c=>s.marks[c.key] ?? ''), gt.seeTotal, gt.total];
  });
  const csv = [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${course.code}_Section${course.section}_results.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function handleFacultyExcelImport(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined'){ toast('The spreadsheet reader failed to load. Check your internet connection and try again.', 'err'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval:'' });
      App.bulkImportFaculty(rows);
    }catch(err){
      console.warn(err);
      toast('Could not read that file. Please upload a valid .xlsx, .xls, or .csv file.', 'err');
    }
    input.value = '';
  };
  reader.onerror = ()=>{ toast('Could not read that file.', 'err'); input.value=''; };
  reader.readAsArrayBuffer(file);
}

              ${ccCourses.map(c=>`<option value="${c.id}">${c.code} — ${c.name} (${branchLabel(c.branch)})</option>`).join('')}
            </select>
          </div>
          <div class="config-field">
            <label>Evaluation Type <span style="text-transform:none;">(auto-detected from Subject Table where possible)</span></label>
            <select id="cc-assign-evaltype">${evalTypeOptionsHtml(ccCourses[0].evalType || lookupAbbrForCode(ccCourses[0].code))}</select>
            <div id="cc-assign-evaltype-note">${evalTypeNoteHtml(ccCourses[0])}</div>
          </div>
          <div class="config-field">
            <label>Instructor <span style="text-transform:none;">(from faculty directory)</span></label>
            <select id="cc-assign-instructor">${buildInstructorOptionsHtml(ccCourses[0].branch)}</select>
          </div>
        </div>
        <button class="btn" style="margin-top:14px;" onclick="App.assignRole('CI', document.getElementById('cc-assign-course').value, document.getElementById('cc-assign-instructor').value, '', document.getElementById('cc-assign-evaltype').value)">Assign &amp; Activate</button>
      </div>

      <div class="card">
        <div class="section-title" style="font-size:15px;">Search my sections</div>
        <input id="cc-search-input" class="search-input" type="text" placeholder="Search by course code, name, branch, or instructor..." style="margin-top:10px;" oninput="updateCCBranchGroups(this.value)">
      </div>

      <div id="cc-branch-groups">${renderCCBranchGroupsHtml(ccCourses,'')}</div>
    `}
  `;
  return wrap;
}
function buildInstructorOptionsHtml(branch){
  const directoryFaculty = App.state.users.filter(u=>u.systemRole==='FACULTY' && u.homeBranch===branch);
  if(directoryFaculty.length===0) return `<option value="">— No faculty uploaded for ${escapeHtml(branchLabel(branch))} yet —</option>`;
  return directoryFaculty.map(f=>`<option value="${escapeHtml(f.email)}">${escapeHtml(f.name)} (${escapeHtml(f.email)})</option>`).join('');
}
function evalTypeNoteHtml(course){
  if(course.evalType) return '';
  const detected = lookupAbbrForCode(course.code);
  if(detected) return `<p style="color:var(--brass);font-size:12.5px;margin-top:6px;">Auto-detected from Subject Table: <strong>${escapeHtml(evalTypeLabel(detected))}</strong>. Change below if this isn't correct.</p>`;
  return `<p style="color:var(--text-soft);font-size:12.5px;margin-top:6px;">Course code ${escapeHtml(course.code)} isn't in the Subject Table — select the Evaluation Type manually.</p>`;
}
function updateCCInstructorOptions(courseId){
  const course = App.getCourse(courseId);
  const sel = document.getElementById('cc-assign-instructor');
  if(sel && course) sel.innerHTML = buildInstructorOptionsHtml(course.branch);
  const etSel = document.getElementById('cc-assign-evaltype');
  if(etSel && course) etSel.innerHTML = evalTypeOptionsHtml(course.evalType || lookupAbbrForCode(course.code));
  const noteEl = document.getElementById('cc-assign-evaltype-note');
  if(noteEl && course) noteEl.innerHTML = evalTypeNoteHtml(course);
}
window.updateCCInstructorOptions = updateCCInstructorOptions;
function renderCCBranchGroupsHtml(ccCourses, term){
  const q = (term||'').trim().toLowerCase();
  const branches = {};
  ccCourses.forEach(c=>{
    const ciUser = getCourseCIUser(c.id);
    const hay = [c.code, c.name, branchLabel(c.branch), ciUser?.name, ciUser?.email].filter(Boolean).join(' ').toLowerCase();
    if(q && !hay.includes(q)) return;
    (branches[c.branch] = branches[c.branch] || []).push(c);
  });
  const branchKeys = Object.keys(branches);
  if(branchKeys.length===0) return emptyStateHtml('No matches', 'Try a different search term.');
  return branchKeys.map(bk=>{
    const list = branches[bk];
    return `
      <div class="branch-heading">${branchLabel(bk)}</div>
      ${list.map(c=>{
        const ciUser = getCourseCIUser(c.id);
        return `
        <div class="card">
          <div class="card-row">
            <div>
              <div class="section-title">${c.name}</div>
              <div class="section-meta">${courseMeta(c)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:14px;">
              ${statusPill(c)}
              ${etPill(c)}
              <button class="btn btn-outline btn-sm" onclick="App.navigate('cc-review',{courseId:'${c.id}'})">View</button>
            </div>
          </div>
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--rule-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <span class="section-meta">Instructor: ${ciUser ? escapeHtml(ciUser.name)+' ('+escapeHtml(ciUser.email)+')' : 'Unassigned'}${c.evalType ? ' · Evaluation Type: '+escapeHtml(evalTypeLabel(c.evalType)) : ''}</span>
            ${ciUser
              ? `<button class="btn btn-red btn-sm" onclick="if(confirm('Revoke Course Instructor access for ${escapeHtml(ciUser.name)} on ${c.code}?')) App.revokeRole('CI','${c.id}')">Revoke Instructor</button>`
              : `<button class="btn btn-sm btn-outline" onclick="openAssignModal('CI','${c.id}')">Assign Instructor</button>`}
          </div>
        </div>`;
      }).join('')}
    `;
  }).join('');
}
function updateCCBranchGroups(term){
  const user = App.currentUser();
  const { ccCourses } = getFacultyCourses(user.id);
  const target = document.getElementById('cc-branch-groups');
  if(target) target.innerHTML = renderCCBranchGroupsHtml(ccCourses, term);
}
window.updateCCBranchGroups = updateCCBranchGroups;

function renderCCReview(params){
  const course = App.getCourse(params.courseId);
  const wrap = el('<div></div>');
  wrap.innerHTML = `
    <div class="page-head">
      <button class="ghost-btn no-print" style="color:var(--ink);border-color:var(--rule);margin-bottom:14px;" onclick="App.navigate('cc-list')">← Back to my coordination</button>
      <div class="page-eyebrow">Coordinator oversight</div>
      <h2>${course.name}</h2>
      <p>${courseMeta(course)} ${statusPill(course)} ${etPill(course)}</p>
      <p class="section-meta" style="margin-top:6px;">${assignmentSummary(course.id)}</p>
    </div>
    <div class="card">
      <p style="color:var(--text-soft);font-size:13.5px;margin:0 0 14px;">Marks review and approval are handled directly by the Executive Assistant and HOD once the instructor submits. As coordinator you can track progress here and manage the instructor assignment from My Coordination.</p>
      ${marksViewTable(course)}
    </div>
  `;
  return wrap;
}

/* ================= FACULTY: no assignments yet ================= */
function renderFacultyEmpty(){
  const wrap = el('<div></div>');
  wrap.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Faculty</div>
      <h2>No active assignments yet</h2>
      <p>Once a Head of Department assigns you as Course Coordinator, or a Course Coordinator assigns you as Course Instructor, your courses will appear here automatically — no separate role request needed.</p>
    </div>
    ${emptyStateHtml('Nothing to show yet','Check back after your department assigns you to a course-section.')}
  `;
  return wrap;
}

/* ---------------- boot ----------------
   No profile data is fetched before sign-in anymore — the login
   screen is just an email/password form now. onAuthStateChange
   (registered above) handles both a fresh sign-in and restoring an
   existing session (INITIAL_SESSION) by calling handleSignedIn(). */
document.addEventListener('DOMContentLoaded', ()=>{
  App.ready = true;

  document.getElementById('logout-btn').addEventListener('click', ()=>App.logout());
  document.getElementById('bell-btn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleNotifPanel(); });
  document.addEventListener('click', (e)=>{
    const panel = document.getElementById('notif-panel');
    if(!panel.classList.contains('hidden') && !panel.contains(e.target) && e.target.id!=='bell-btn'){
      closeNotifPanel();
    }
  });

  const loginForm = document.getElementById('login-form');
  const loginBtn = document.getElementById('login-submit-btn');
  if(loginForm) loginForm.addEventListener('submit', (e)=>{ e.preventDefault(); App.submitLogin(); });
  if(loginBtn) loginBtn.addEventListener('click', ()=>App.submitLogin());
});
</script>
</body>
</html>
